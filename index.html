<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>座位查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js" onerror="window.APP_CONFIG=window.APP_CONFIG||{}"></script>
<style>
  :root{
    --ivory:#FAF6EF; --card:#FFFFFF; --ink:#332C27; --ink-soft:#6E645A;
    --gold:#B8935A; --gold-light:#EFE2C9; --line:#E7DED2; --danger:#B85C5C;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--ivory);color:var(--ink);font-family:'Noto Sans TC',sans-serif;
    overscroll-behavior:none;}
  h1,h2{font-family:'Noto Serif TC',serif;margin:0;}
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;}

  .wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  .header{padding:22px 20px 14px;text-align:center;background:linear-gradient(180deg,#fffdf9,var(--ivory));border-bottom:1px solid var(--line);}
  .header h1{font-size:22px;letter-spacing:1.5px;}
  .header .rule{width:70px;height:2px;margin:8px auto;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .header p{margin:0;font-size:15.5px;color:var(--ink-soft);letter-spacing:.5px;}

  .search-area{padding:16px 18px;position:relative;}
  .search-box{position:relative;}
  .search-input{width:100%;padding:14px 16px;font-size:16px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);text-align:center;}
  .search-input:focus{outline:none;border-color:var(--gold);}
  .search-hint{font-size:16px;color:var(--ink-soft);margin-top:6px;padding-left:2px;}

  .suggest-list{position:absolute;left:18px;right:18px;top:56px;background:#fff;border:1px solid var(--line);
    border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.1);z-index:30;overflow:hidden;max-height:260px;overflow-y:auto;}
  .suggest-item{padding:12px 16px;font-size:15px;font-weight:600;border-bottom:1px solid var(--line);}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:active{background:var(--gold-light);}
  .suggest-empty{padding:14px 16px;font-size:13px;color:var(--ink-soft);text-align:center;}

  .stage-section{padding:0 18px 8px;flex:1;display:flex;flex-direction:column;}
  .stage-viewport{position:relative;width:100%;height:48vh;min-height:300px;background:#F6F1E8;
    background-image:radial-gradient(circle,#e4dac6 1px,transparent 1px);background-size:22px 22px;
    border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .stage-world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
  .stage-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft);font-size:13px;text-align:center;padding:20px;pointer-events:none;}

  .ptable{position:absolute;width:250px;}
  .ptable-topbar{display:flex;justify-content:center;padding-bottom:2px;}
  .ptable-no{font-family:'Noto Serif TC',serif;font-size:11px;color:#b3a48c;background:#fff;border:1px solid var(--line);border-radius:20px;padding:1px 8px;}
  .plabel-row{display:flex;justify-content:center;}
  .plabel{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:var(--ink);background:#fff;
    border:1.5px solid var(--line);border-radius:14px;padding:2px 10px;}
  .prow{display:flex;gap:6px;justify-content:center;overflow:visible;}
  .prow.top{margin-top:18px;}
  .psurface{height:26px;margin:5px 8px;border-radius:4px;background:repeating-linear-gradient(135deg,#fff 0 10px,#f3ece0 10px 20px);border:1px solid var(--line);}
  .pseat{width:74px;height:56px;border-radius:6px;background:#fff;border:1.5px solid #e5ddcf;position:relative;overflow:visible;}
  .pseat.filled{background:#EFE9DC;}
  .pseat.match{border-color:var(--mc,var(--gold));box-shadow:0 0 0 3px var(--mc,var(--gold));
    animation:pulseSeat 1.6s ease-in-out infinite;}
  @keyframes pulseSeat{
    0%,100%{box-shadow:0 0 0 3px var(--mc,var(--gold));}
    50%{box-shadow:0 0 0 7px var(--mc,var(--gold));}
  }
  .pseat-badge{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:28px;height:28px;border-radius:50%;
    background:#fff;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.18);z-index:5;}
  .pseat-badge svg{width:27px;height:27px;display:block;}
  .pseat-name{position:absolute;left:0;right:0;bottom:5px;text-align:center;font-size:14px;font-weight:700;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;}

  .result-panel{padding:14px 4px 4px;}
  .result-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .result-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;margin-bottom:8px;}
  .result-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:1px dashed var(--line);}
  .result-row:first-of-type{border-top:none;}
  .result-row .ricon{width:25px;height:25px;flex:none;}
  .result-row .rname{font-weight:700;flex:1;font-size:18px;}
  .result-row .rmeal{font-size:18px;color:var(--ink-soft);}
  .result-row .rloc{font-size:18px;color:var(--gold);font-weight:600;white-space:nowrap;}
  .result-row.unassigned .rloc{color:var(--danger);}
  .reset-btn{display:block;margin:10px auto 4px;font-size:12.5px;color:var(--ink-soft);background:none;border:none;text-decoration:underline;}

  .footer-note{text-align:center;font-size:11px;color:#b3a89a;padding:14px 20px 24px;}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>婚宴座位查詢</h1>
    <div class="rule"></div>
    <p>請輸入您的姓名，查詢座位</p>
  </div>

  <div class="search-area">
    <div class="search-box">
      <input class="search-input" id="searchInput" placeholder="輸入姓名，例如：王小明" autocomplete="off" oninput="onSearchInput(this.value)" />
      <div class="suggest-list" id="suggestList" style="display:none;"></div>
    </div>
    <div class="search-hint">輸入任一個字即可搜尋，同行賓客會一起顯示</div>
    <div class="search-hint">到達座位後，桌上會有您的姓名卡</div>
  </div>

  <div class="stage-section">
    <div class="stage-viewport" id="stageViewport">
      <div class="stage-world" id="stageWorld"></div>
      <div class="stage-placeholder" id="stagePlaceholder">正在載入座位圖...</div>
    </div>
    <div class="result-panel" id="resultPanel"></div>
  </div>

  <div class="footer-note">座位如有異動請以現場公告為準</div>
</div>

<script>
/* ---------------- config & state ---------------- */
const CFG = window.APP_CONFIG || {};
let guests = [];
let tables = [];
let worldBounds = {minX:0,minY:0,maxX:1200,maxY:800};

/* ---------------- meal icons (shared style with admin) ---------------- */
function mealColor(meal){
  const map = {'牛肉':'#A8553F','鴨肉':'#ff9b0e','兒童餐':'#6FA8A0','素食':'#5E8B4F','嬰兒':'#B7A6D6'};
  return map[meal] || '#B0A695';
}
function mealIcon(meal){
  const c = mealColor(meal);
  const icons = {
    '牛肉': `<svg viewBox="0 0 32 32"><path d="M16 5c-2 0-3 2-3 2s-3-3-6-1c-2 1-2 4 0 5 0 0-2 2-2 5 0 5 5 9 11 9s11-4 11-9c0-3-2-5-2-5 2-1 2-4 0-5-3-2-6 1-6 1s-1-2-3-2z" fill="${c}"/><ellipse cx="16" cy="21" rx="4" ry="3" fill="#fff" opacity="0.9"/><circle cx="14.3" cy="21" r="0.9" fill="${c}"/><circle cx="17.7" cy="21" r="0.9" fill="${c}"/><circle cx="11.3" cy="15" r="1.1" fill="#2b2b2b"/><circle cx="20.7" cy="15" r="1.1" fill="#2b2b2b"/></svg>`,
    '鴨肉': `<svg viewBox="0 0 32 32"><ellipse cx="17" cy="14" rx="8" ry="7" fill="${c}"/><path d="M9 15c-3 0-6 1-6 3s3 2 6 1z" fill="${c}"/><circle cx="19.5" cy="11.5" r="1.2" fill="#2b2b2b"/></svg>`,
    '兒童餐': `<svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="12" fill="${c}"/><circle cx="11.5" cy="14" r="1.6" fill="#fff"/><circle cx="20.5" cy="14" r="1.6" fill="#fff"/><path d="M10 20c2 3 10 3 12 0" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,
    '素食': `<svg viewBox="0 0 32 32"><path d="M6 27C5 14 17 6 27 6c1 10-3 22-19 22-1.3 0-1.7-0.3-2-1z" fill="${c}"/><path d="M9 24C13 16 18 12 24 9" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.85"/></svg>`,
    '嬰兒': `<svg viewBox="0 0 32 32"><rect x="12" y="10" width="8" height="14" rx="3" fill="${c}"/><rect x="13" y="4.5" width="6" height="6.5" rx="2" fill="${c}" opacity="0.55"/><rect x="14" y="2" width="4" height="3" rx="1.5" fill="${c}"/></svg>`
  };
  return icons[meal] || `<svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="11" fill="none" stroke="${c}" stroke-width="2.5"/><text x="16" y="21" font-size="14" text-anchor="middle" fill="${c}" font-family="sans-serif">?</text></svg>`;
}
function escapeHTML(s){
  return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- name grouping ---------------- */
// 姓名命名規則：同行賓客用「姓名 + 單一大寫英文字母」表示，例如 王小明 / 王小明A / 王小明B
// baseNameOf 會把結尾的單一大寫字母去掉，回傳共同的基準姓名
function baseNameOf(name){
  if(!name) return name;
  return /^.+[A-Z]$/.test(name) && name.length > 1 ? name.slice(0, -1) : name;
}

/* ---------------- data loading ---------------- */
function getGuestAtSeat(tableId, seatIndex){ return guests.find(g=>g.tableId===tableId && g.seatIndex===seatIndex); }

async function loadData(){
  if(!CFG.SUPABASE_URL || !CFG.SUPABASE_ANON_KEY || !CFG.EVENT_CODE){
    document.getElementById('stagePlaceholder').textContent = '尚未設定連線資訊，請聯絡新人';
    return;
  }
  try{
    const client = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
    const { data, error } = await client.from('wedding_seating_data').select('data').eq('event_code', CFG.EVENT_CODE).maybeSingle();
    if(error) throw error;
    guests = (data && data.data && data.data.guests) || [];
    tables = (data && data.data && data.data.tables) || [];
    computeWorldBounds();
    renderStageStatic();
    document.getElementById('stagePlaceholder').style.display = tables.length ? 'none' : 'flex';
    if(!tables.length){ document.getElementById('stagePlaceholder').textContent = '座位資訊尚未建立，請稍後再查詢'; }
    focusOn(worldBounds, true);
  }catch(err){
    console.error(err);
    document.getElementById('stagePlaceholder').textContent = '座位資料載入失敗，請稍後再試';
  }
}

function computeWorldBounds(){
  let minX=0,minY=0,maxX=1200,maxY=800;
  tables.forEach(t=>{ maxX=Math.max(maxX, t.x+300); maxY=Math.max(maxY, t.y+280); });
  worldBounds = {minX, minY, maxX, maxY};
}

/* ---------------- stage rendering ---------------- */
let highlightSet = new Set();

function pseatCellHTML(t, i){
  const occ = getGuestAtSeat(t.id, i);
  if(!occ) return '<div class="pseat"></div>';
  const isMatch = highlightSet.has(occ.id);
  if(isMatch){
    const c = mealColor(occ.meal);
    return '<div class="pseat filled match" style="--mc:'+c+'">'+
      '<div class="pseat-badge" style="border-color:'+c+'">'+mealIcon(occ.meal)+'</div>'+
      '<span class="pseat-name">'+escapeHTML(occ.name)+'</span>'+
    '</div>';
  }
  return '<div class="pseat filled"></div>';
}
function ptableHTML(t){
  const top=[0,1,2].map(i=>pseatCellHTML(t,i)).join('');
  const bottom=[3,4,5].map(i=>pseatCellHTML(t,i)).join('');
  return '<div class="ptable" style="left:'+t.x+'px; top:'+t.y+'px;">'+
    '<div class="ptable-topbar"><span class="ptable-no">#'+t.no+'</span></div>'+
    '<div class="plabel-row"><span class="plabel">'+escapeHTML(t.topName||(t.no+'A'))+'</span></div>'+
    '<div class="prow top">'+top+'</div>'+
    '<div class="psurface"></div>'+
    '<div class="prow">'+bottom+'</div>'+
    '<div class="plabel-row" style="margin-top:10px;"><span class="plabel">'+escapeHTML(t.bottomName||(t.no+'B'))+'</span></div>'+
  '</div>';
}
function renderStageStatic(){
  const world = document.getElementById('stageWorld');
  world.style.width = (worldBounds.maxX-worldBounds.minX)+'px';
  world.style.height = (worldBounds.maxY-worldBounds.minY)+'px';
  world.innerHTML = tables.map(ptableHTML).join('');
}

function computeTransform(bounds, viewportW, viewportH, marginFactor){
  const w = Math.max(1, bounds.maxX-bounds.minX), h = Math.max(1, bounds.maxY-bounds.minY);
  const scale = Math.min(viewportW/w, viewportH/h) * marginFactor;
  const cx = (bounds.minX+bounds.maxX)/2, cy = (bounds.minY+bounds.maxY)/2;
  const tx = viewportW/2 - scale*cx;
  const ty = viewportH/2 - scale*cy;
  return {scale, tx, ty};
}
function applyTransform(t, animate){
  const world = document.getElementById('stageWorld');
  world.style.transition = animate ? 'transform 1.25s cubic-bezier(.2,.8,.2,1)' : 'none';
  world.style.transform = 'translate('+t.tx+'px,'+t.ty+'px) scale('+t.scale+')';
}
function focusOn(bounds, immediate){
  const vp = document.getElementById('stageViewport');
  const overviewT = computeTransform(worldBounds, vp.clientWidth, vp.clientHeight, 0.92);
  applyTransform(overviewT, false);
  void vp.offsetWidth; // force reflow
  if(immediate) return;
  setTimeout(()=>{
    const targetT = computeTransform(bounds, vp.clientWidth, vp.clientHeight, 0.78);
    applyTransform(targetT, true);
  }, 550);
}

/* ---------------- search ---------------- */
let baseNameList = [];
function rebuildBaseNameList(){
  const set = new Set();
  guests.forEach(g=> set.add(baseNameOf(g.name)));
  baseNameList = Array.from(set);
}

function onSearchInput(v){
  const q = v.trim();
  const list = document.getElementById('suggestList');
  if(!q){ list.style.display='none'; list.innerHTML=''; return; }
  const matches = baseNameList.filter(n=>n.includes(q)).slice(0,8);
  if(matches.length===0){
    list.innerHTML = '<div class="suggest-empty">查無符合的姓名</div>';
  } else {
    list.innerHTML = matches.map(n=>'<div class="suggest-item" onclick="selectName(\''+n.replace(/'/g,"\\'")+'\')">'+escapeHTML(n)+'</div>').join('');
  }
  list.style.display = 'block';
}
function selectName(baseName){
  document.getElementById('searchInput').value = baseName;
  document.getElementById('suggestList').style.display = 'none';
  runSearch(baseName);
}
function resetSearch(){
  document.getElementById('searchInput').value = '';
  document.getElementById('resultPanel').innerHTML = '';
  highlightSet = new Set();
  renderStageStatic();
  focusOn(worldBounds);
}

function runSearch(baseName){
  const matched = guests.filter(g=> baseNameOf(g.name) === baseName);
  const resultPanel = document.getElementById('resultPanel');
  if(matched.length===0){
    resultPanel.innerHTML = '<div class="result-card">查無「'+escapeHTML(baseName)+'」的資料，請確認姓名是否正確</div>';
    return;
  }
  highlightSet = new Set(matched.filter(g=>g.tableId!=null).map(g=>g.id));
  renderStageStatic();

  const seatedTables = new Set(matched.filter(g=>g.tableId!=null).map(g=>g.tableId));
  let rowsHTML = matched.map(g=>{
    const seated = g.tableId!=null;
    const t = seated ? tables.find(x=>x.id===g.tableId) : null;
    const label = seated ? (g.seatIndex<3 ? (t.topName||(t.no+'A')) : (t.bottomName||(t.no+'B'))) : '';
    return '<div class="result-row '+(seated?'':'unassigned')+'">'+
      '<span class="rname">'+escapeHTML(g.name)+'</span>'+
      '<span class="ricon">'+mealIcon(g.meal)+'</span>'+
      '<span class="rmeal">'+escapeHTML(g.meal||'未填餐點')+'</span>'+
      '<span class="rloc">'+(seated ? escapeHTML(label) : '尚未安排') +'</span>'+
    '</div>';
  }).join('');
  resultPanel.innerHTML = '<div class="result-card"><div class="result-title">找到 '+matched.length+' 位「'+escapeHTML(baseName)+'」</div>'+rowsHTML+'</div>'+
    '<button class="reset-btn" onclick="resetSearch()">重新查詢</button>';

  if(seatedTables.size>0){
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    seatedTables.forEach(tid=>{
      const t = tables.find(x=>x.id===tid);
      minX=Math.min(minX,t.x-30); minY=Math.min(minY,t.y-30);
      maxX=Math.max(maxX,t.x+280); maxY=Math.max(maxY,t.y+270);
    });
    focusOn({minX,minY,maxX,maxY});
  } else {
    focusOn(worldBounds);
  }
}

document.addEventListener('click', function(e){
  if(!e.target.closest('.search-box')){
    document.getElementById('suggestList').style.display='none';
  }
});

window.addEventListener('resize', function(){
  focusOn(worldBounds, true);
});

/* ---------------- init ---------------- */
loadData().then(()=>{ rebuildBaseNameList(); });
</script>
</body>
</html>
