<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>座位查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js" onerror="window.APP_CONFIG=window.APP_CONFIG||{}"></script>
<style>
  :root{
    --ivory:#FAF6EF; --card:#FFFFFF; --ink:#332C27; --ink-soft:#6E645A;
    --gold:#B8935A; --gold-light:#EFE2C9; --line:#E7DED2; --danger:#B85C5C;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--ivory);color:var(--ink);font-family:'Noto Sans TC',sans-serif;
    overscroll-behavior:none;}
  h1,h2{font-family:'Noto Serif TC',serif;margin:0;}
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;}

  .wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  .header{padding:22px 20px 14px;text-align:center;background:linear-gradient(180deg,#fffdf9,var(--ivory));border-bottom:1px solid var(--line);}
  .header h1{font-size:18px;letter-spacing:1.5px;}
  .header .rule{width:70px;height:2px;margin:8px auto;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .header p{margin:0;font-size:15.5px;color:var(--ink-soft);letter-spacing:.5px;}

  .search-area{padding:16px 18px;position:relative;z-index:30;}
  .suggest-overlay{position:fixed;inset:0;background:rgba(20,16,12,.45);z-index:25;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .suggest-overlay.show{opacity:1;pointer-events:auto;}
  .search-box{position:relative;}
  .search-input{width:100%;padding:14px 16px;font-size:16px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);text-align: center;}
  .search-input:focus{outline:none;border-color:var(--gold);}
  .search-hint{font-size:16px;color:var(--ink-soft);margin-top:6px;padding-left:2px;}

  .suggest-list{position:absolute;left:18px;right:18px;top:56px;background:#fff;border:1px solid var(--line);
    border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.1);z-index:30;overflow:hidden;max-height:260px;overflow-y:auto;}
  .suggest-item{padding:12px 16px;font-size:15px;font-weight:600;border-bottom:1px solid var(--line);text-align: center;}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:active{background:var(--gold-light);}
  .suggest-empty{padding:14px 16px;font-size:13px;color:var(--ink-soft);text-align:center;}

  .stage-section{padding:0 18px 8px;flex:1;display:flex;flex-direction:column;}
  .stage-viewport{position:relative;width:100%;height:48vh;min-height:300px;background:#F6F1E8;
    background-image:radial-gradient(circle,#e4dac6 1px,transparent 1px);background-size:22px 22px;
    border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .stage-world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
  .stage-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft);font-size:13px;text-align:center;padding:20px;pointer-events:none;}

  .ptable{position:absolute;width:250px;z-index:2;}

  .plandmark{position:absolute;z-index:1;}
  .plandmark img{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 2px 5px rgba(0,0,0,.15));}
  .plandmark-label{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);white-space:nowrap;font-size:10.5px;font-weight:700;
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:1px 7px;color:var(--ink-soft);display: none;}
  .ptable-topbar{display:none;justify-content:center;padding-bottom:2px;}
  .ptable-no{font-family:'Noto Serif TC',serif;font-size:11px;color:#b3a48c;background:#fff;border:1px solid var(--line);border-radius:20px;padding:1px 8px;}
  .plabel-row{display:flex;justify-content:center;overflow:visible;}
  .plabel{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:var(--ink);background:#fff;
    border:1.5px solid var(--line);border-radius:14px;padding:2px 10px;position:relative;}
  .plabel.matched{
    border: 2.5px solid transparent;
    border-radius: 99em;
    padding: 5px 20px;
    font-size: 24px;
    color: #E99729;
    background:
        linear-gradient(#fff, #fff) padding-box, 
        /* 【關鍵1】明確寫出 0%, 25%, 50%, 75%, 100%，確保顏色對稱分布 */
        linear-gradient(180deg, #ffffff 0%, #E99729 25%, #ffffff 50%, #E99729 75%, #ffffff 100%) border-box; 
    /* 【關鍵2】高度改成 200%，剛好容納兩個完整的「白->橘->白」循環 */
    background-size: 100% 100%, 100% 200%; 
    box-shadow: 0 3px 12px rgba(184,147,90,.4);
    animation: labelBubblePop .75s 2s cubic-bezier(.34,1.56,.64,1) both, plabelBorderFlow 2.2s 2s linear infinite;

    z-index: 6;
    margin: -12px;
    bottom: 10px;
  }
  @keyframes plabelBorderFlow{
    0%{ background-position: 0 0, 0% 0; }
    100%{ background-position: 0 0, 0 100%; }
  }

   @keyframes labelBubblePop{
    0%{ opacity:0; transform: translateY(16px) scale(.4,.6); }
    35%{ opacity:1; transform: translateY(-8px) scale(1.2,.8); }
    55%{ transform: translateY(4px) scale(.85,1.15); }
    72%{ transform: translateY(-3px) scale(1.08,.94); }
    88%{ transform: translateY(1px) scale(.97,1.03); }
    100%{ opacity:1; transform: translateY(0) scale(1,1); }
  } 
  @keyframes textPopUpTop{
    0%{ opacity:0; transform: translateY(9px) scale(.55); }
    55%{ opacity:1; transform: translateY(-4.5px) scale(1.2); }
    78%{ transform: translateY(2px) scale(.94); }
    100%{ opacity:1; transform: translateY(0) scale(1); }
  }
  .prow{display:flex;gap:6px;justify-content:center;overflow:visible;}
  .prow.top{margin-top:25px;}
  .psurface{height:26px;margin:5px 8px;border-radius:4px;background:repeating-linear-gradient(135deg,#fff 0 10px,#f3ece0 10px 20px);border:1px solid var(--line);}
  .pseat{width:74px;height:56px;border-radius:6px;background:#fff;border:1.5px solid #e5ddcf;position:relative;overflow:visible;}
  .pseat.filled{background:#EFE9DC;}

  .pseat.match{
    border:2px solid var(--mc,var(--gold));
    border-radius:7px;
    background:#fff;
    animation:
      bubbleEmerge .95s cubic-bezier(.34,1.56,.64,1) both,
      seatGlow 1.8s ease-in-out infinite,
      bubbleFloat 2.6s ease-in-out infinite;
    animation-delay: 2s, 2s, 2.95s;
    z-index:8;
  }
  .pseat.match::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:7px;
    box-shadow: inset 0 0 10px rgba(255,255,255,.5);
    pointer-events:none;
  }
  .pseat.match::after{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:9px;
    border:1px solid var(--mc,var(--gold));
    animation:seatRipple 1.8s ease-out infinite;
    animation-delay:.35s;
    pointer-events:none;
  }

  .pseat-bubble{position:absolute;border-radius:50%;pointer-events:none;opacity:0;
    background:radial-gradient(circle at 30% 28%, rgba(255,255,255,.95), rgba(255,255,255,.25) 55%, rgba(255,255,255,.05) 75%);
    border:1.2px solid var(--mc,rgba(255,255,255,.8));
    box-shadow:0 0 3px rgba(255,255,255,.6);
    animation:bubbleRise 3s ease-in-out infinite;}
  .pseat-bubble.b1{width:9px;height:9px;left:8px;bottom:4px;animation-delay:.2s;}
  .pseat-bubble.b2{width:6px;height:6px;right:10px;bottom:12px;animation-delay:1.1s;}
  .pseat-bubble.b3{width:7px;height:7px;left:32px;bottom:0px;animation-delay:2s;}
  @keyframes bubbleRise{
    0%{ opacity:0; transform:translate(0,0) scale(.6); }
    15%{ opacity:.9; }
    70%{ opacity:.65; }
    100%{ opacity:0; transform:translate(4px,-32px) scale(1.15); }
  }



  .pseat-sparkle{position:absolute;font-size:12px;line-height:1;pointer-events:none;
    filter:drop-shadow(0 0 3px rgba(255,255,255,.9));animation:sparkleTwinkle 1.6s ease-in-out infinite;}
  .pseat-sparkle.s1{top:-9px;left:-9px;animation-delay:0s;}
  .pseat-sparkle.s2{top:-7px;right:-10px;animation-delay:.55s;}
  .pseat-sparkle.s3{bottom:-10px;left:30px;animation-delay:1.1s;}
  @keyframes sparkleTwinkle{
    0%,100%{opacity:0;transform:scale(.3) rotate(0deg);}
    50%{opacity:1;transform:scale(1.25) rotate(25deg);}
  }
  @keyframes seatGlow{
    0%,100%{ box-shadow: 0 0 8px 1px var(--mc,var(--gold)), 0 5px 16px rgba(0,0,0,.2); }
    50%{ box-shadow: 0 0 22px 6px var(--mc,var(--gold)), 0 5px 16px rgba(0,0,0,.2); }

  }

  @keyframes seatBorderFlow{
    0%{ background-position:0 0, 0% 0; }
    100%{ background-position:0 0, 300% 0; }
  }
  @keyframes seatRipple{
    0%{ transform:scale(1); opacity:.85; }
    100%{ transform:scale(1.35); opacity:0; }
  }

  @keyframes bubbleEmerge{
    0%{ opacity:0; transform:translateY(26px) scale(.35,.55); border-radius:50%; }
    35%{ opacity:1; transform:translateY(-9px) scale(1.18,.82); border-radius:38%; }
    55%{ transform:translateY(5px) scale(.88,1.14); border-radius:26%; }
    72%{ transform:translateY(-3px) scale(1.06,.95); border-radius:16%; }
    88%{ transform:translateY(1px) scale(.98,1.02); border-radius:9%; }
    100%{ opacity:1; transform:translateY(0) scale(1,1); border-radius:7px; }
  }
  @keyframes bubbleFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-3.5px); }

  }

  @keyframes seatPopIn{
    0%{ opacity:0.8; transform:scale(1) rotate(0deg); }
    50%{ opacity:1; transform:scale(1) rotate(0deg); }
    70%{ transform:scale(1.1) rotate(0deg); }
    100%{ opacity:1; transform:scale(1) rotate(0deg); }
  }
  @keyframes pulseSeat{
    0%,100%{box-shadow:0 0 3px 1px var(--mc,var(--gold));}
    50%{box-shadow:0 0 8px 3px var(--mc,var(--gold));}
  }
  .pseat-badge{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:28px;height:28px;border-radius:50%;
    background:#fff;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.18);z-index:5;}
  /*.pseat-badge svg{width:27px;height:27px;display:block;}*/
  .pseat-name{position:absolute;left:0;right:0;bottom:10px;text-align:center;font-size:15px;font-weight:700;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;}

  .result-panel{padding:14px 4px 4px;}
  .result-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .result-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;margin-bottom:8px;}
  .result-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:1px dashed var(--line);justify-content: space-evenly;}
  .result-row:first-of-type{border-top:none;}
  .result-row .rname{font-weight:700;flex:0.8;font-size:18px;}
  .result-row .ricon{width:25px;height:25px;flex:none;}
  .result-row .rmeal{font-size:18px;color:var(--ink-soft);}
  .result-row .rloc{font-size:18px;color:var(--gold);font-weight:600;white-space:nowrap;}
  .result-row.unassigned .rloc{color:var(--danger);}
  .reset-btn{display:block;width:100%;margin:12px 0 4px;padding:12px;font-size:14px;font-weight:700;
    color:#fff;background:var(--ink);border:1px solid var(--ink);border-radius:10px;letter-spacing:1px;}
  .reset-btn:active{background:var(--gold);border-color:var(--gold);}

  .stage-recenter{position:absolute;bottom:10px;right:10px;z-index:10;width:38px;height:38px;border-radius:50%;
    background:#fff;border:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.15);
    display:none;align-items:center;justify-content:center;font-size:16px;color:var(--ink-soft);}
  .stage-zoom-hint{position:absolute;top:8px;right:10px;z-index:10;font-size:10.5px;color:var(--ink-soft);
    background:rgba(255,255,255,.85);border-radius:8px;padding:3px 8px;pointer-events:none;}

  /* 相機對焦框：總覽階段標出目標所在位置，帶「搜尋對焦」的手感 */
  .focus-frame{position:absolute;width:124px;height:124px;margin:-32px 0 0 -32px;pointer-events:none;z-index:15;
    animation:focusHunt 4s cubic-bezier(.2,.8,.2,1) both;}
  .focus-frame .corner{position:absolute;width:46px;height:46px;border-color:#6C6C6C;border-style:solid;border-width:0;}
  .focus-frame .c-tl{top:0;left:0;border-top-width:7.5px;border-left-width:7.5px;}
  .focus-frame .c-tr{top:0;right:0;border-top-width:7.5px;border-right-width:7.5px;}
  .focus-frame .c-bl{bottom:0;left:0;border-bottom-width:7.5px;border-left-width:7.5px;}
  .focus-frame .c-br{bottom:0;right:0;border-bottom-width:7.5px;border-right-width:7.5px;}
  @keyframes focusHunt{
    0%{ transform:scale(1.7); opacity:0; }
    45%{ transform:scale(.82); opacity:1; }
    75%{ transform:scale(1.08); }
    100%{ transform:scale(1); opacity:1; }
  }

  /* 電影黑邊：拉近的瞬間從上下滑入，安頓後再收回 
  .cine-bar{position:absolute;left:0;right:0;height:13%;background:#0c0a08;z-index:50;pointer-events:none;
    transform:scaleY(0);transition:transform 1s cubic-bezier(.4,0,.2,1);}
  .cine-bar.top{top:0;transform-origin:top;}
  .cine-bar.bottom{bottom:0;transform-origin:bottom;}
  .stage-viewport.cinematic .cine-bar{transform:scaleY(1);}
  .stage-viewport.cinematic{box-shadow:inset 0 0 40px rgba(0,0,0,.35);}*/

  /* 底片顆粒：拉近過程中疊一層淡淡的雜訊顆粒，模擬類比膠卷質感 */
  .film-grain{position:absolute;inset:-20px;z-index:45;pointer-events:none;opacity:0;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size:150px 150px;mix-blend-mode:overlay;
    transition:opacity .5s ease;
    animation:grainFlicker .5s steps(3) infinite;}
  .stage-viewport.cinematic .film-grain{opacity:.4;}
  @keyframes grainFlicker{
    0%{ transform:translate(0,0); }
    33%{ transform:translate(-2%,1.5%); }
    66%{ transform:translate(1.5%,-2%); }
    100%{ transform:translate(0,0); }
  }

  /* 鏡頭光暈：運鏡過程中一道光斑掃過畫面 */
  .lens-flare{position:absolute;top:65%;left:-12%;width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(255,230,175,.55) 32%, transparent 70%);
    filter:blur(1px);pointer-events:none;z-index:46;opacity:0;
    animation-name:flareSweep;animation-timing-function:ease-in-out;animation-fill-mode:forwards;}
  .lens-flare::before, .lens-flare::after{content:"";position:absolute;border-radius:50%;
    background:rgba(255,240,210,.5);}
  .lens-flare::before{width:14px;height:14px;top:70px;left:-40px;}
  .lens-flare::after{width:8px;height:8px;top:-50px;left:-70px;}
  @keyframes flareSweep{
    0%{ opacity:0; left:-12%; top:72%; }
    18%{ opacity:.9; }
    50%{ left:52%; top:18%; opacity:.65; }
    82%{ opacity:.35; }
    100%{ opacity:0; left:118%; top:2%; }
  }

  /* 開場字卡：抵達後淡入顯示賓客姓名，像電影角色登場字幕 
  .title-card{position:absolute;left:50%;top:50%;transform:translate(-50%,-42%);text-align:center;
    z-index:48;pointer-events:none;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.65);opacity:0;
    animation:titleCardShow 2.8s ease-in-out forwards;}
  .title-card .tc-name{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;letter-spacing:5px;}
  .title-card .tc-rule{width:46px;height:1px;background:var(--pc,#fff);margin:10px auto;opacity:.85;}
  .title-card .tc-sub{font-size:12px;letter-spacing:4px;opacity:.9;}
  @keyframes titleCardShow{
    0%{ opacity:0; transform:translate(-50%,-32%); }
    18%{ opacity:1; transform:translate(-50%,-42%); }
    78%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-46%); }
  }*/


  .footer-note{text-align:center;font-size:11px;color:#b3a89a;padding:14px 20px 24px;}
</style>
</head>
<body>
<div class="suggest-overlay" id="suggestOverlay"></div>

<div class="wrap">
  <div class="header">
    <h1>HsiEn & LeeHsin</h1>
    <h1></h1>
    <div class="rule"></div>
    <p>婚宴座位查詢</p>
  </div>

  <div class="search-area">
    <div class="search-box">
      <input class="search-input" id="searchInput" placeholder="輸入姓名，例如：王小明" autocomplete="off" oninput="onSearchInput(this.value)" />
      <div class="suggest-list" id="suggestList" style="display:none;"></div>
    </div>
    <div class="search-hint">輸入名字中任一字搜尋，同行賓客會一起顯示。</div>
    <div class="search-hint">到達座位後，桌上會有您的姓名卡。</div>
  </div>

  <div class="stage-section">
    <div class="stage-viewport" id="stageViewport">
      <div class="stage-world" id="stageWorld"></div>
      <div class="stage-placeholder" id="stagePlaceholder">正在載入座位圖...</div>
      <div class="stage-zoom-hint">可用手指縮放 / 拖曳查看</div>
      <div class="stage-recenter" id="stageRecenter" onclick="recenter()" title="回到座位">⛶</div>
    </div>
    <div class="result-panel" id="resultPanel"></div>
  </div>

  <div class="footer-note"></div>
</div>

<script>
/* ---------------- config & state ---------------- */
const CFG = window.APP_CONFIG || {};
let guests = [];
let tables = [];
let landmarks = [];
let worldBounds = {minX:0,minY:0,maxX:1200,maxY:800};

/* ---------------- meal icons (shared style with admin) ---------------- */
function mealColor(meal){
  const map = {'牛肉':'#A8553F','鴨肉':'#ffe000','兒童餐':'#6FA8A0','素食':'#5E8B4F','嬰兒':'#B7A6D6'};
  return map[meal] || '#B0A695';
}
function mealIcon(meal, size){
  const px = size || 16;
  const map = {'牛肉':'🍖','鴨肉':'🦆','兒童餐':'👶','素食':'🌳','嬰兒':'🍼'};
  const e = map[meal] || '🍽️';
  return '<span style="font-size:'+px+'px;line-height:1;display:inline-flex;align-items:center;justify-content:center;width:100%;height:100%;">'+e+'</span>';
}
function escapeHTML(s){
  return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- name grouping ---------------- */
// 姓名命名規則：同行賓客用「姓名 + 單一大寫英文字母」表示，例如 王小明 / 王小明A / 王小明B
// baseNameOf 會把結尾的單一大寫字母去掉，回傳共同的基準姓名
function baseNameOf(name){
  if(!name) return name;
  return /^.+[A-Z]$/.test(name) && name.length > 1 ? name.slice(0, -1) : name;
}

/* ---------------- data loading ---------------- */
function getGuestAtSeat(tableId, seatIndex){ return guests.find(g=>g.tableId===tableId && g.seatIndex===seatIndex); }

async function loadData(){
  if(!CFG.SUPABASE_URL || !CFG.SUPABASE_ANON_KEY || !CFG.EVENT_CODE){
    document.getElementById('stagePlaceholder').textContent = '尚未設定連線資訊，請聯絡新人';
    return;
  }
  try{
    const client = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
    const { data, error } = await client.from('wedding_seating_data').select('data').eq('event_code', CFG.EVENT_CODE).maybeSingle();
    if(error) throw error;
    guests = (data && data.data && data.data.guests) || [];
    tables = (data && data.data && data.data.tables) || [];
    landmarks = (data && data.data && data.data.landmarks) || [];
    computeWorldBounds();
    renderStageStatic();
    document.getElementById('stagePlaceholder').style.display = tables.length ? 'none' : 'flex';
    if(!tables.length){ document.getElementById('stagePlaceholder').textContent = '座位資訊尚未建立，請稍後再查詢'; }
    focusOn(worldBounds, true);
  }catch(err){
    console.error(err);
    document.getElementById('stagePlaceholder').textContent = '座位資料載入失敗，請稍後再試';
  }
}

function computeWorldBounds(){
  let minX=0,minY=0,maxX=1200,maxY=800;
  tables.forEach(t=>{ maxX=Math.max(maxX, t.x+300); maxY=Math.max(maxY, t.y+280); });
  landmarks.forEach(l=>{ maxX=Math.max(maxX, l.x+l.w+40); maxY=Math.max(maxY, l.y+l.h+40); });
  worldBounds = {minX, minY, maxX, maxY};
}

/* ---------------- stage rendering ---------------- */
let highlightSet = new Set();
let highlightLabelKeys = new Set();

function pseatCellHTML(t, i){
  const occ = getGuestAtSeat(t.id, i);
  if(!occ) return '<div class="pseat"></div>';
  const isMatch = highlightSet.has(occ.id);
  if(isMatch){
    const c = mealColor(occ.meal);
    return '<div class="pseat filled match" style="--mc:'+c+'">'+
      '<div class="pseat-badge" style="border-color:'+c+'">'+mealIcon(occ.meal,23)+'</div>'+
      '<span class="pseat-name">'+escapeHTML(occ.name)+'</span>'+
      '<span class="pseat-bubble b1"></span>'+
      '<span class="pseat-bubble b2"></span>'+
      '<span class="pseat-bubble b3"></span>'+
    '</div>';
  }
  return '<div class="pseat filled"></div>';
}
function ptableHTML(t){
  const top=[0,1,2].map(i=>pseatCellHTML(t,i)).join('');
  const bottom=[3,4,5].map(i=>pseatCellHTML(t,i)).join('');
  const topMatch = highlightLabelKeys.has(t.id+'-top');
  const bottomMatch = highlightLabelKeys.has(t.id+'-bottom');
  return '<div class="ptable" style="left:'+t.x+'px; top:'+t.y+'px;">'+
    '<div class="ptable-topbar"><span class="ptable-no">#'+t.no+'</span></div>'+
    '<div class="plabel-row"><span class="plabel'+(topMatch?' matched':'')+'">'+escapeHTML(t.topName||(t.no+'A'))+'</span></div>'+
    '<div class="prow top">'+top+'</div>'+
    '<div class="psurface"></div>'+
    '<div class="prow">'+bottom+'</div>'+
    '<div class="plabel-row" style="margin-top:37px;"><span class="plabel'+(bottomMatch?' matched':'')+'">'+escapeHTML(t.bottomName||(t.no+'B'))+'</span></div>'+
  '</div>';
}
function plandmarkHTML(l){
  return '<div class="plandmark" style="left:'+l.x+'px; top:'+l.y+'px; width:'+l.w+'px; height:'+l.h+'px;">'+
    '<img src="'+l.url+'" alt="" />'+
    (l.name ? '<span class="plandmark-label">'+escapeHTML(l.name)+'</span>' : '') +
  '</div>';
}
function renderStageStatic(){
  const world = document.getElementById('stageWorld');
  world.style.width = (worldBounds.maxX-worldBounds.minX)+'px';
  world.style.height = (worldBounds.maxY-worldBounds.minY)+'px';
  world.innerHTML = landmarks.map(plandmarkHTML).join('') + tables.map(ptableHTML).join('');
  /*fitTextToWidth(world.querySelectorAll('.pseat-name'), 7);*/
}

/* ---- 姓名過長時自動縮小字體，而不是被裁切看不到 ---- */
function fitTextToWidth(elements, minPx){
  elements.forEach(el=>{
    let size = parseFloat(getComputedStyle(el).fontSize);
    let guard = 8;
    while(el.scrollWidth > el.clientWidth + 0.5 && size > minPx && guard-- > 0){
      size -= 1;
      el.style.fontSize = size + 'px';
    }
  });
}

function computeTransform(bounds, viewportW, viewportH, marginFactor){
  const w = Math.max(1, bounds.maxX-bounds.minX), h = Math.max(1, bounds.maxY-bounds.minY);
  const scale = Math.min(viewportW/w, viewportH/h) * marginFactor;
  const cx = (bounds.minX+bounds.maxX)/2, cy = (bounds.minY+bounds.maxY)/2;
  const tx = viewportW/2 - scale*cx;
  const ty = viewportH/2 - scale*cy;
  return {scale, tx, ty};
}

/* ---- transform state (shared by auto animation + manual pan/zoom) ---- */
let currentT = {scale:1, tx:0, ty:0};
const MIN_SCALE = 0.15, MAX_SCALE = 6;

/* 可以在這裡調整節奏：延遲時間、拉近時長、緩動曲線 */
const ZOOM_DELAY_MS = 900;       // 總覽停留多久才開始拉近（對焦框「搜尋鎖定」的時間）
const ZOOM_DURATION_MS = 1700;   // 拉近動畫時長（慢動作運鏡，數字越大越慢）
const ZOOM_EASING = 'cubic-bezier(.65,0,.35,1)'; // 平滑、沉穩、不帶彈跳的電影運鏡曲線
const RACK_FOCUS_BLUR = 2;       // 總覽階段的景深模糊程度（px），拉近時會慢慢變清晰

function applyTransform(t, animate, blurPx){
  currentT = t;
  const world = document.getElementById('stageWorld');

  const dur = (ZOOM_DURATION_MS/1000)+'s';
  world.style.transition = animate ? ('transform '+dur+' '+ZOOM_EASING+', filter '+dur+' '+ZOOM_EASING) : 'none';
  world.style.transform = 'translate('+t.tx+'px,'+t.ty+'px) scale('+t.scale+')';
  if(blurPx!=null) world.style.filter = blurPx>0 ? ('blur('+blurPx+'px)') : 'none';
}

function readRenderedTransform(){
  const world = document.getElementById('stageWorld');
  const cs = getComputedStyle(world);
  try{
    const m = new DOMMatrixReadOnly(cs.transform);
    return { scale: m.a || 1, tx: m.e || 0, ty: m.f || 0 };
  }catch(err){ return currentT; }
}

/* ---- 相機對焦框（總覽階段，標出目標在整個會場的哪個位置，像相機搜尋對焦）---- */
let focusFrameEl = null;
function clearFocusFrame(){
  if(focusFrameEl && focusFrameEl.parentNode) focusFrameEl.parentNode.removeChild(focusFrameEl);
  focusFrameEl = null;
}
function showFocusFrame(cx, cy, color){
  clearFocusFrame();
  const world = document.getElementById('stageWorld');
  const el = document.createElement('div');
  el.className = 'focus-frame';
  el.style.left = cx+'px';
  el.style.top = cy+'px';
  el.style.setProperty('--pc', color || '#B8935A');
  el.innerHTML = '<span class="corner c-tl"></span><span class="corner c-tr"></span>'+
                  '<span class="corner c-bl"></span><span class="corner c-br"></span>';
  world.appendChild(el);
  focusFrameEl = el;
}

/* ---- 鏡頭光暈：運鏡過程中一道光斑掃過畫面 ---- */
function showLensFlare(durationMs){
  const vp = document.getElementById('stageViewport');
  const el = document.createElement('div');
  el.className = 'lens-flare';
  el.style.animationDuration = (durationMs/1000)+'s';
  vp.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, durationMs + 200);
}

/* ---- 開場字卡：抵達後淡入顯示賓客姓名，像電影角色登場字幕 ---- 
function showTitleCard(name, sub, color){
  const vp = document.getElementById('stageViewport');
  const el = document.createElement('div');
  el.className = 'title-card';
  el.style.setProperty('--pc', color || '#B8935A');
  el.innerHTML = '<div class="tc-name">'+escapeHTML(name)+'</div><div class="tc-rule"></div>'+
    (sub ? '<div class="tc-sub">'+escapeHTML(sub)+'</div>' : '');
  vp.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 2900);
}*/

let lastFocusBounds = null, lastFocusMargin = 0.92, lastViewportW = 0;
function focusOn(bounds, immediate, focusColor, titleName, titleSub){
  const vp = document.getElementById('stageViewport');
  lastViewportW = vp.clientWidth;
  const overviewT = computeTransform(worldBounds, vp.clientWidth, vp.clientHeight, 0.92);
  applyTransform(overviewT, false, 0);
  void vp.offsetWidth; // force reflow
  clearFocusFrame();
  vp.classList.remove('cinematic');
  if(immediate){
    lastFocusBounds = worldBounds; lastFocusMargin = 0.92;
    document.getElementById('stageRecenter').style.display = 'none';
    return;
  }

  const cx = (bounds.minX+bounds.maxX)/2, cy = (bounds.minY+bounds.maxY)/2;
  showFocusFrame(cx, cy, focusColor);
  document.getElementById('stageWorld').style.filter = 'blur('+RACK_FOCUS_BLUR+'px)'; // 先稍微失焦，醞釀期待感

  /* ---- 停留在總覽的「延遲時間」（找到座位前，全部桌子縮小總覽要停留多久才開始拉近） ---- */
  setTimeout(()=>{
    clearFocusFrame();
    vp.classList.add('cinematic'); // 電影黑邊滑入 + 底片顆粒浮現
    //showLensFlare(ZOOM_DURATION_MS); // 光暈隨運鏡掃過畫面
    const targetT = computeTransform(bounds, vp.clientWidth, vp.clientHeight, 0.78);
    applyTransform(targetT, true, 0); // 運鏡拉近的同時，景深也一起慢慢對焦清晰
    lastFocusBounds = bounds; lastFocusMargin = 0.78;
    document.getElementById('stageRecenter').style.display = (bounds !== worldBounds) ? 'flex' : 'none';

    setTimeout(()=>{
      vp.classList.remove('cinematic'); // 安頓後黑邊與顆粒收回
      if(titleName) showTitleCard(titleName, titleSub, focusColor);
    }, ZOOM_DURATION_MS + 600);
  }, ZOOM_DELAY_MS);
}
function recenter(){
  if(!lastFocusBounds) return;
  const vp = document.getElementById('stageViewport');
  currentT = readRenderedTransform();
  document.getElementById('stageWorld').style.transition = 'none';
  void vp.offsetWidth;
  const t = computeTransform(lastFocusBounds, vp.clientWidth, vp.clientHeight, lastFocusMargin);
  applyTransform(t, true, 0);
}

/* ---- manual pinch-zoom / drag-pan / wheel-zoom on the stage ---- */
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function clampScale(s){ return Math.max(MIN_SCALE, Math.min(MAX_SCALE, s)); }

const activePointers = new Map();
let panStart = null;
let pinchStartDist = null, pinchStartScale = 1, pinchStartTx = 0, pinchStartTy = 0, pinchAnchor = null;

function initGestures(){
  const vp = document.getElementById('stageViewport');
  vp.style.touchAction = 'none';

  vp.addEventListener('pointerdown', (e)=>{
    vp.setPointerCapture(e.pointerId);
    if(activePointers.size===0){ currentT = readRenderedTransform(); document.getElementById('stageWorld').style.transition='none'; }
    activePointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if(activePointers.size===1){
      panStart = { x:e.clientX, y:e.clientY, tx0:currentT.tx, ty0:currentT.ty };
    } else if(activePointers.size===2){
      const pts = Array.from(activePointers.values());
      pinchStartDist = dist(pts[0], pts[1]);
      pinchStartScale = currentT.scale;
      pinchStartTx = currentT.tx; pinchStartTy = currentT.ty;
      const center = {x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
      pinchAnchor = { x:(center.x-pinchStartTx)/pinchStartScale, y:(center.y-pinchStartTy)/pinchStartScale };
      panStart = null;
    }
  });
  vp.addEventListener('pointermove', (e)=>{
    if(!activePointers.has(e.pointerId)) return;
    activePointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if(activePointers.size===1 && panStart){
      const dx = e.clientX - panStart.x, dy = e.clientY - panStart.y;
      applyTransform({scale:currentT.scale, tx:panStart.tx0+dx, ty:panStart.ty0+dy}, false);
    } else if(activePointers.size===2 && pinchStartDist){
      const pts = Array.from(activePointers.values());
      const d = dist(pts[0], pts[1]);
      const center = {x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
      const newScale = clampScale(pinchStartScale * (d/pinchStartDist));
      const newTx = center.x - pinchAnchor.x*newScale;
      const newTy = center.y - pinchAnchor.y*newScale;
      applyTransform({scale:newScale, tx:newTx, ty:newTy}, false);
    }
  });
  function endPointer(e){
    activePointers.delete(e.pointerId);
    pinchStartDist = null;
    if(activePointers.size===1){
      const remaining = Array.from(activePointers.values())[0];
      panStart = { x:remaining.x, y:remaining.y, tx0:currentT.tx, ty0:currentT.ty };
    } else {
      panStart = null;
    }
  }
  vp.addEventListener('pointerup', endPointer);
  vp.addEventListener('pointercancel', endPointer);
  vp.addEventListener('pointerleave', (e)=>{ if(activePointers.has(e.pointerId)) endPointer(e); });

  vp.addEventListener('wheel', (e)=>{
    e.preventDefault();
    currentT = readRenderedTransform();
    document.getElementById('stageWorld').style.transition='none';
    const rect = vp.getBoundingClientRect();
    const cx = e.clientX-rect.left, cy = e.clientY-rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 0.87;
    const newScale = clampScale(currentT.scale * factor);
    const worldX = (cx-currentT.tx)/currentT.scale, worldY = (cy-currentT.ty)/currentT.scale;
    applyTransform({scale:newScale, tx:cx-worldX*newScale, ty:cy-worldY*newScale}, false);
  }, {passive:false});
}

/* ---------------- search ---------------- */
let baseNameList = [];
function rebuildBaseNameList(){
  const set = new Set();
  guests.forEach(g=> set.add(baseNameOf(g.name)));
  baseNameList = Array.from(set);
}

function onSearchInput(v){
  const q = v.trim();
  const list = document.getElementById('suggestList');
  const overlay = document.getElementById('suggestOverlay');
  if(!q){ list.style.display='none'; list.innerHTML=''; overlay.classList.remove('show'); return; }
  const matches = baseNameList.filter(n=>n.includes(q)).slice(0,8);
  if(matches.length===0){
    list.innerHTML = '<div class="suggest-empty">查無符合的姓名</div>';
  } else {
    list.innerHTML = matches.map(n=>'<div class="suggest-item" onclick="selectName(\''+n.replace(/'/g,"\\'")+'\')">'+escapeHTML(n)+'</div>').join('');
  }
  list.style.display = 'block';
  overlay.classList.add('show');
}
function selectName(baseName){
  document.getElementById('searchInput').value = baseName;
  document.getElementById('suggestList').style.display = 'none';
  document.getElementById('suggestList').innerHTML = '';
  document.getElementById('suggestOverlay').classList.remove('show');
  runSearch(baseName);
}
function resetSearch(){
  document.getElementById('searchInput').value = '';
  document.getElementById('suggestList').style.display = 'none';
  document.getElementById('suggestList').innerHTML = '';
  document.getElementById('suggestOverlay').classList.remove('show');
  document.getElementById('resultPanel').innerHTML = '';
  highlightSet = new Set();
  highlightLabelKeys = new Set();
  renderStageStatic();
  focusOn(worldBounds, true);
}

function runSearch(baseName){
  const matched = guests.filter(g=> baseNameOf(g.name) === baseName);
  const resultPanel = document.getElementById('resultPanel');
  if(matched.length===0){
    highlightSet = new Set();
    highlightLabelKeys = new Set();
    renderStageStatic();
    resultPanel.innerHTML = '<div class="result-card">查無「'+escapeHTML(baseName)+'」的資料，請確認姓名是否正確</div>'+
      '<button class="reset-btn" onclick="resetSearch()">重新查詢</button>';
    return;
  }
  const seatedMatched = matched.filter(g=>g.tableId!=null);
  highlightSet = new Set(seatedMatched.map(g=>g.id));
  highlightLabelKeys = new Set(seatedMatched.map(g=> g.tableId+'-'+(g.seatIndex<3 ? 'top' : 'bottom')));
  renderStageStatic();

  const seatedTables = new Set(matched.filter(g=>g.tableId!=null).map(g=>g.tableId));
  let rowsHTML = matched.map(g=>{
    const seated = g.tableId!=null;
    const t = seated ? tables.find(x=>x.id===g.tableId) : null;
    const label = seated ? (g.seatIndex<3 ? (t.topName||(t.no+'A')) : (t.bottomName||(t.no+'B'))) : '';
    return '<div class="result-row '+(seated?'':'unassigned')+'">'+
      '<span class="rname">'+escapeHTML(g.name)+'</span>'+
      '<span class="ricon">'+mealIcon(g.meal)+'</span>'+
      '<span class="rmeal">'+escapeHTML(g.meal||'未填餐點')+'</span>'+
      '<span class="rloc">'+(seated ? escapeHTML(label) : '尚未安排') +'</span>'+
    '</div>';
  }).join('');
  resultPanel.innerHTML = '<div class="result-card"><div class="result-title">找到 '+matched.length+' 位「'+escapeHTML(baseName)+'」</div>'+rowsHTML+'</div>'+
    '<button class="reset-btn" onclick="resetSearch()">重新查詢</button>';
  fitTextToWidth(resultPanel.querySelectorAll('.rname'), 10);

  if(seatedTables.size>0){
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    seatedTables.forEach(tid=>{
      const t = tables.find(x=>x.id===tid);
      minX=Math.min(minX,t.x-30); minY=Math.min(minY,t.y-30);
      maxX=Math.max(maxX,t.x+280); maxY=Math.max(maxY,t.y+270);
    });

    const focusColor = mealColor(seatedMatched[0].meal);
    const primary = seatedMatched[0];
    const primaryTable = tables.find(x=>x.id===primary.tableId);
    const primaryLabel = primaryTable ? (primary.seatIndex<3 ? (primaryTable.topName||(primaryTable.no+'A')) : (primaryTable.bottomName||(primaryTable.no+'B'))) : '';
    focusOn({minX,minY,maxX,maxY}, false, focusColor, baseName, primaryLabel);
  } else {
    focusOn(worldBounds, true);
  }
}

/* 只有點選下拉選單中的姓名才會關閉選單，點擊其他地方不會關閉 */

let resizeDebounce = null;
window.addEventListener('resize', function(){
  clearTimeout(resizeDebounce);
  resizeDebounce = setTimeout(()=>{
    const vp = document.getElementById('stageViewport');
    // 手機瀏覽器捲動時網址列收合只會改變高度，寬度不變時忽略，避免畫面自動縮小
    if(Math.abs(vp.clientWidth - lastViewportW) < 40) return;
    lastViewportW = vp.clientWidth;
    if(lastFocusBounds){
      const t = computeTransform(lastFocusBounds, vp.clientWidth, vp.clientHeight, lastFocusMargin);
      applyTransform(t, false);
    }
  }, 200);
});

/* ---------------- init ---------------- */
initGestures();
loadData().then(()=>{ rebuildBaseNameList(); });
</script>
